services:
  logatory:
    build: .
    image: logatory:latest
    container_name: logatory
    restart: unless-stopped
    ports:
      - "${LOGATORY_PORT:-8080}:8080"
    volumes:
      # Persistent SQLite database
      - logatory-data:/data
      # Optional: mount your config.yaml (copy config.yaml.example first)
      # - ./config.yaml:/app/config.yaml:ro
    environment:
      # Bearer token for REST API (leave empty to disable auth)
      - LOGATORY_API_TOKEN=${LOGATORY_API_TOKEN:-}
      # PII salt for pseudonymization (set a random secret)
      - LOGATORY_PII_SALT=${LOGATORY_PII_SALT:-}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  logatory-data:
    driver: local
