# Publishes the package to PyPI via Trusted Publishing (OIDC — no API token
# is stored anywhere). Runs when a GitHub Release is published, or manually.
#
# One-time setup on PyPI — https://pypi.org/manage/account/publishing/
# Add a "pending publisher" with:
#   PyPI project name : logatory
#   Owner             : T0nd3
#   Repository name   : logatory
#   Workflow name     : publish.yml
#   Environment name  : pypi
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
